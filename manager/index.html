<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LI Collectors Co - Manager</title>
  <!-- Load Tailwind natively for rapid prototyping -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Brand matching configuration mapping to Tailwind's arbitrary variables-->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { navy: '#0A192F', gold: '#D4AF37' },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-navy text-white font-sans flex flex-col h-screen overflow-hidden selection:bg-gold selection:text-navy">
  <!-- Top Navigation Header -->
  <header class="flex justify-between items-center p-6 border-b border-gold/20 bg-[#061020] shadow-lg flex-shrink-0">
    <div class="flex items-center gap-4">
      <!-- Standard icon mapped via external link so we don't have to fetch Vite asset chains inside pure HTML -->
      <svg class="h-10 text-gold" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      <div>
        <h1 class="text-2xl font-extrabold tracking-wide">LI Collectors Co.</h1>
        <p class="text-gold text-sm tracking-widest uppercase">Inventory Manager</p>
      </div>
    </div>
    <div class="flex items-center gap-6 z-10 relative">
      <div id="sync-status" class="text-sm font-medium text-gray-400"></div>
      <button id="sync-btn" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all flex items-center gap-2">
        Sync to Live Site
      </button>
    </div>
  </header>

  <!-- Core Body View -->
  <main class="flex-grow flex flex-col p-8 overflow-hidden gap-8">
    <div class="flex justify-between items-end flex-shrink-0">
      <div class="flex flex-col gap-2">
        <label class="text-gold font-bold uppercase tracking-wider text-sm">Target eBay Setup</label>
        <div class="flex gap-4">
          <input 
            id="ebay-input"
            type="text" 
            placeholder="Paste eBay Item ID..." 
            class="bg-[#050c18] border border-gold/30 rounded px-4 py-2 w-72 focus:outline-none focus:border-gold shadow-inner"
          />
          <button id="add-btn" class="bg-gold text-navy hover:bg-yellow-500 font-bold py-2 px-6 rounded shadow-[0_0_15px_rgba(212,175,55,0.2)] transition-all">
            Import Item
          </button>
        </div>
      </div>
      <div id="add-status" class="text-sm font-medium text-gold ml-4"></div>
    </div>

    <!-- Active Vault Grid -->
    <div class="bg-[#050c18] border border-gold/20 rounded-xl flex-grow p-6 overflow-y-auto flex flex-col shadow-inner">
      <h2 class="text-xl font-bold mb-6 border-b border-gold/10 pb-4">Active Vault Database</h2>
      
      <div id="vault-grid" class="flex flex-col gap-4">
        <!-- Rendered purely via JS injections -->
      </div>
    </div>

  </main>
  
  <script src="renderer.js"></script>
</body>
</html>
