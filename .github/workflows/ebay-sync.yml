name: eBay Automated Vault Sync

on:
  schedule:
    - cron: '0 */12 * * *' # Runs exactly every 12 hours
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  sync_vault:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node Actions Stack
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Execute Node Ebay Scraping Pipeline
        # Add your live eBay IDs here separated by a space!
        run: node scripts/add-to-vault.js 145698305710

      - name: Compile Automated Sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and Push Overwitten JSON and Arrays
        run: |
          git config --global user.name 'eBay GitHub Action Auto-Sync'
          git config --global user.email 'automation@licollectorsco.com'
          git add src/data.json public/sitemap.xml
          # Check if git diff picked up any data string modifications and push if so!
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-synced vault with active eBay listing arrays" && git push)
